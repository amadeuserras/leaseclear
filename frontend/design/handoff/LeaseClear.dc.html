<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  ::selection { background: rgba(255,255,255,0.22); }
  input::placeholder, textarea::placeholder { color: rgba(236,237,239,0.36); }
</style>
</helmet>

<div style="font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #16171b; min-height: 100vh; width: 100%; color: #ECEDEF;">

  <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}">
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
      <div style="width: 380px; max-width: 100%; background: #1e2025; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 36px 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.35);">

        <div style="display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 28px;">
          <div style="width: 46px; height: 38px; border-radius: 14px 14px 14px 4px; background: #4C9EEB; display: flex; align-items: center; justify-content: center;">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div style="font-size: 17px; font-weight: 600; color: #ECEDEF; letter-spacing: -0.01em;">LeaseClear</div>
        </div>

        <div style="text-align: center; margin-bottom: 28px;">
          <div style="font-size: 13px; color: rgba(236,237,239,0.55); line-height: 1.5;">Sign in to ask questions about your lease</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 14px;">
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 12.5px; font-weight: 500; color: rgba(236,237,239,0.62);">Email</label>
            <input type="email" placeholder="you@example.com" style="width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit; color: #ECEDEF; background: #26282e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; outline: none;" style-focus="border-color: rgba(255,255,255,0.4); box-shadow: 0 0 0 3px rgba(255,255,255,0.12);" />
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 12.5px; font-weight: 500; color: rgba(236,237,239,0.62);">Password</label>
            <input type="password" placeholder="••••••••" style="width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit; color: #ECEDEF; background: #26282e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; outline: none;" style-focus="border-color: rgba(255,255,255,0.4); box-shadow: 0 0 0 3px rgba(255,255,255,0.12);" />
          </div>

          <div style="display: flex; justify-content: flex-end; margin-top: -6px;">
            <span style="font-size: 12.5px; color: rgba(236,237,239,0.55); cursor: pointer; white-space: nowrap;" style-hover="color: #ECEDEF;">Forgot password?</span>
          </div>

          <button onClick="{{ goToApp }}" style="width: 100%; padding: 11px; margin-top: 4px; font-size: 14px; font-weight: 600; font-family: inherit; color: #17181b; background: #EDEDEF; border: none; border-radius: 8px; cursor: pointer;" style-hover="background: #ffffff;">Sign in</button>

          <div style="display: flex; align-items: center; gap: 12px; margin: 6px 0;">
            <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.08);"></div>
            <div style="font-size: 12px; color: rgba(236,237,239,0.4);">or</div>
            <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.08);"></div>
          </div>

          <button onClick="{{ goToApp }}" style="width: 100%; padding: 10px; font-size: 14px; font-weight: 500; font-family: inherit; color: #ECEDEF; background: #26282e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px;" style-hover="background: #2c2f36; border-color: rgba(255,255,255,0.16);">
            <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.2-2.27H12v4.3h6.47c-.28 1.5-1.13 2.77-2.4 3.62v3h3.88c2.27-2.09 3.58-5.17 3.58-8.65z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.88-3c-1.08.72-2.45 1.16-4.05 1.16-3.11 0-5.74-2.1-6.68-4.92H1.32v3.09C3.29 21.3 7.31 24 12 24z"/><path fill="#FBBC05" d="M5.32 14.33A7.2 7.2 0 0 1 4.9 12c0-.81.14-1.6.42-2.33V6.58H1.32A11.98 11.98 0 0 0 0 12c0 1.93.46 3.76 1.32 5.42l4-3.09z"/><path fill="#EA4335" d="M12 4.75c1.76 0 3.34.61 4.58 1.8l3.44-3.44C17.94 1.19 15.24 0 12 0 7.31 0 3.29 2.7 1.32 6.58l4 3.09C6.26 6.85 8.89 4.75 12 4.75z"/></svg>
            Continue with Google
          </button>
        </div>

        <div style="text-align: center; margin-top: 22px; font-size: 12.5px; color: rgba(236,237,239,0.5);">
Don't have an account? <span onClick="{{ goToApp }}" style="color: #ECEDEF; font-weight: 500; cursor: pointer;" style-hover="color: #4C9EEB;">Create one</span> or <span onClick="{{ goToApp }}" style="color: #ECEDEF; font-weight: 500; cursor: pointer;" style-hover="color: #4C9EEB;">try demo</span>
        </div>
      </div>
    </div>
  </sc-if>

  <sc-if value="{{ isApp }}" hint-placeholder-val="{{ false }}">
    <div style="min-height: 100vh; display: flex; flex-direction: column;">

      <div style="display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <div style="width: 32px; height: 26px; border-radius: 10px 10px 10px 3px; background: #4C9EEB; display: flex; align-items: center; justify-content: center;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div style="font-size: 15px; font-weight: 600; color: #ECEDEF; letter-spacing: -0.01em;">LeaseClear</div>
        </div>
        <div style="width: 32px; height: 32px; border-radius: 50%; background: #3C4450; color: #ECEDEF; display: flex; align-items: center; justify-content: center; font-size: 12.5px; font-weight: 600;">JD</div>
      </div>

      <div style="flex: 1; display: flex; gap: 20px; padding: 20px 28px; min-height: 0;">

        <div style="width: 300px; flex-shrink: 0; background: #1e2025; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; display: flex; flex-direction: column; min-height: 0;">
          <div style="padding: 16px 18px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;">
            <div style="font-size: 13.5px; font-weight: 600; color: #ECEDEF;">Sources</div>
            <div style="font-size: 12px; color: rgba(236,237,239,0.4);">{{ sourceCountLabel }}</div>
          </div>

          <div style="padding: 0 18px 14px; flex-shrink: 0;">
            <button style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px; padding: 9px; font-size: 13px; font-weight: 500; font-family: inherit; color: #ECEDEF; background: #26282e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer;" style-hover="background: #2c2f36; border-color: rgba(255,255,255,0.16);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 4v12M12 4l-5 5M12 4l5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Upload documents
            </button>
          </div>

          <div style="padding: 4px 18px 12px; display: flex; align-items: center; justify-content: flex-end; gap: 9px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; flex-shrink: 0;">
            <label style="font-size: 13px; color: rgba(236,237,239,0.7); cursor: pointer; white-space: nowrap; flex-shrink: 0;" onClick="{{ toggleSelectAll }}">Select all</label>
            <div onClick="{{ toggleSelectAll }}" style="width: 19px; height: 19px; border-radius: 5px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1.5px solid {{ selectAllBorder }}; background: {{ selectAllBg }};">
              <sc-if value="{{ allChecked }}" hint-placeholder-val="{{ false }}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#ECEDEF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </sc-if>
            </div>
            <div style="width: 22px; flex-shrink: 0;"></div>
          </div>

          <div style="flex: 1; overflow-y: auto; padding: 8px 10px;">
            <sc-for list="{{ sources }}" as="src" hint-placeholder-count="4">
              <div style="position: relative; display: flex; align-items: center; gap: 10px; padding: 9px 8px; border-radius: 8px; margin-bottom: 2px; background: {{ src.rowBg }};" style-hover="background: rgba(255,255,255,0.05);">
                <div style="width: 26px; height: 30px; flex-shrink: 0; border-radius: 3px; background: #2c2f36; border: 1px solid rgba(255,255,255,0.08); position: relative; display: flex; align-items: flex-end; justify-content: center; overflow: hidden;">
                  <div style="position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 8px 8px 0; border-color: transparent #16171b transparent transparent;"></div>
                  <div style="font-size: 6px; font-weight: 700; color: rgba(236,237,239,0.5); margin-bottom: 3px; letter-spacing: 0.02em;">PDF</div>
                </div>
                <div style="flex: 1; min-width: 0; font-size: 13px; color: #ECEDEF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ src.name }}</div>
                <div onClick="{{ src.onToggle }}" style="width: 19px; height: 19px; border-radius: 5px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1.5px solid {{ src.checkboxBorder }}; background: {{ src.checkboxBg }};">
                  <sc-if value="{{ src.checked }}" hint-placeholder-val="{{ false }}">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#ECEDEF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </sc-if>
                </div>
                <div style="position: relative; flex-shrink: 0;">
                  <button onClick="{{ src.onMenuToggle }}" style="width: 22px; height: 22px; border-radius: 6px; border: none; background: transparent; color: rgba(236,237,239,0.5); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;" style-hover="background: rgba(255,255,255,0.08); color: #ECEDEF;">⋯</button>
                  <sc-if value="{{ src.menuOpen }}" hint-placeholder-val="{{ false }}">
                    <div style="position: absolute; top: 26px; right: 0; z-index: 10; background: #26282e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); padding: 4px; min-width: 110px;">
                      <div onClick="{{ src.onMenuToggle }}" style="padding: 7px 10px; font-size: 12.5px; color: #ECEDEF; border-radius: 5px; cursor: pointer;" style-hover="background: rgba(255,255,255,0.06);">Remove</div>
                    </div>
                  </sc-if>
                </div>
              </div>
            </sc-for>
          </div>
        </div>

        <div style="flex: 1; min-width: 0; background: #1e2025; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; display: flex; flex-direction: column; min-height: 0;">

          <div style="flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; flex-direction: column; gap: 22px;">
            <sc-for list="{{ messages }}" as="msg" hint-placeholder-count="4">
              <sc-if value="{{ msg.isUser }}" hint-placeholder-val="{{ true }}">
                <div style="display: flex; justify-content: flex-end;">
                  <div style="max-width: 72%; background: #26282e; border-radius: 14px; padding: 10px 15px; font-size: 14.5px; line-height: 1.55; color: #ECEDEF;">{{ msg.text }}</div>
                </div>
              </sc-if>
              <sc-if value="{{ msg.isAssistant }}" hint-placeholder-val="{{ false }}">
                <div style="max-width: 84%; font-size: 14.5px; line-height: 1.7; color: rgba(236,237,239,0.9);">
                  <sc-for list="{{ msg.segments }}" as="seg" hint-placeholder-count="3">
                    <sc-if value="{{ seg.isText }}" hint-placeholder-val="{{ true }}">
                      <span>{{ seg.value }}</span>
                    </sc-if>
                    <sc-if value="{{ seg.isCite }}" hint-placeholder-val="{{ false }}">
                      <span style="display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 500; color: #ECEDEF; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); border-radius: 20px; padding: 1px 8px; margin: 0 2px; white-space: nowrap; vertical-align: middle; cursor: default;">{{ seg.value }}</span>
                    </sc-if>
                  </sc-for>
                </div>
              </sc-if>
            </sc-for>
          </div>

          <div style="flex-shrink: 0; padding: 16px 20px 20px; border-top: 1px solid rgba(255,255,255,0.08);">
            <div style="display: flex; align-items: center; gap: 10px; background: #26282e; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 8px 8px 8px 18px;" style-focus="border-color: rgba(255,255,255,0.35);">
              <input type="text" placeholder="Ask a question about your lease…" style="flex: 1; background: transparent; border: none; outline: none; color: #ECEDEF; font-size: 14px; font-family: inherit;" />
              <div style="font-size: 12px; color: rgba(236,237,239,0.4); white-space: nowrap; flex-shrink: 0;">{{ selectedSourcesLabel }}</div>
              <button style="width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%; border: none; background: #EDEDEF; cursor: pointer; display: flex; align-items: center; justify-content: center;" style-hover="background: #ffffff;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M12 5l-6 6M12 5l6 6" stroke="#17181b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    view: 'login',
    sources: [
      { id: 1, name: '123 Oak Street Lease Agreement.pdf', checked: true },
      { id: 2, name: 'Pet Policy Addendum.pdf', checked: true },
      { id: 3, name: 'Move-In Inspection Report.pdf', checked: false },
      { id: 4, name: 'Lease Renewal Notice 2026.pdf', checked: true }
    ],
    openMenuId: null
  };

  goToApp = () => this.setState({ view: 'app' });

  toggleSource = (id) => {
    this.setState(s => ({
      sources: s.sources.map(src => src.id === id ? { ...src, checked: !src.checked } : src)
    }));
  };

  toggleMenu = (id) => {
    this.setState(s => ({ openMenuId: s.openMenuId === id ? null : id }));
  };

  toggleSelectAll = () => {
    this.setState(s => {
      const allChecked = s.sources.every(src => src.checked);
      return { sources: s.sources.map(src => ({ ...src, checked: !allChecked })) };
    });
  };

  renderVals() {
    const { view, sources, openMenuId } = this.state;
    const allChecked = sources.every(s => s.checked);
    const selectedCount = sources.filter(s => s.checked).length;

    const messages = [
      { isUser: true, isAssistant: false, text: 'What is the security deposit, and when do I get it back after move-out?' },
      {
        isUser: false, isAssistant: true,
        segments: [
          { isText: true, value: 'The security deposit is ' },
          { isText: true, value: '$2,400', isCite: false },
          { isText: true, value: ', equal to one month\u2019s rent ' },
          { isCite: true, isText: false, value: 'Lease · §4.1' },
          { isText: true, value: '. Your landlord must return it, minus any lawful deductions, within ' },
          { isText: true, value: '21 days' },
          { isText: true, value: ' of move-out ' },
          { isCite: true, isText: false, value: 'Lease · §4.3' },
          { isText: true, value: '.' }
        ]
      },
      { isUser: true, isAssistant: false, text: 'Can I have a cat? Is there a pet deposit?' },
      {
        isUser: false, isAssistant: true,
        segments: [
          { isText: true, value: 'Yes — one cat is allowed with prior written approval ' },
          { isCite: true, isText: false, value: 'Pet Addendum · §1' },
          { isText: true, value: '. A separate pet deposit of ' },
          { isText: true, value: '$350' },
          { isText: true, value: ' applies, plus a non-refundable ' },
          { isText: true, value: '$25/month' },
          { isText: true, value: ' pet fee ' },
          { isCite: true, isText: false, value: 'Pet Addendum · §2' },
          { isText: true, value: '.' }
        ]
      },
      { isUser: true, isAssistant: false, text: 'What happens if I pay rent 5 days late?' },
      {
        isUser: false, isAssistant: true,
        segments: [
          { isText: true, value: 'Rent is due on the 1st, with a ' },
          { isText: true, value: '5-day grace period' },
          { isText: true, value: '. After that, a late fee of ' },
          { isText: true, value: '$75' },
          { isText: true, value: ' plus ' },
          { isText: true, value: '$10/day' },
          { isText: true, value: ' applies ' },
          { isCite: true, isText: false, value: 'Lease · §3.2' },
          { isText: true, value: '. On day 5 you would owe the base late fee only, since it falls within the grace window.' }
        ]
      }
    ];

    return {
      isLogin: view === 'login',
      isApp: view === 'app',
      goToApp: this.goToApp,
      allChecked,
      toggleSelectAll: this.toggleSelectAll,
      selectAllBg: allChecked ? '#4a4d55' : 'transparent',
      selectAllBorder: allChecked ? '#4a4d55' : 'rgba(255,255,255,0.25)',
      sourceCountLabel: selectedCount + ' of ' + sources.length,
      selectedSourcesLabel: selectedCount + ' source' + (selectedCount === 1 ? '' : 's'),
      sources: sources.map(src => ({
        ...src,
        rowBg: 'transparent',
        checkboxBg: src.checked ? '#4a4d55' : 'transparent',
        checkboxBorder: src.checked ? '#4a4d55' : 'rgba(255,255,255,0.25)',
        onToggle: () => this.toggleSource(src.id),
        onMenuToggle: () => this.toggleMenu(src.id),
        menuOpen: openMenuId === src.id
      })),
      messages
    };
  }
}

</script>
</body>
</html>
